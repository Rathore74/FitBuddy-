<!DOCTYPE html>
<html>
<head>
    <title>FitBuddy AI</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; background-color: #f0f2f5; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background-color: #1a73e8; color: white; font-weight: bold; cursor: pointer; border: none; }
        pre { background: #f8f9fa; padding: 15px; border-radius: 8px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏋️ FitBuddy AI</h1>
        <form action="/generate" method="post">
            <input type="number" name="weight" placeholder="Weight (kg)" required>
            <input type="text" name="goal" placeholder="Fitness Goal (e.g., Muscle Gain)" required>
            <button type="submit">Generate Plan</button>
        </form>

        {% if plan %}
        <h3>Your AI Fitness Plan:</h3>
        <pre>{{ plan }}</pre>
        {% endif %}
    </div>
</body>
</html>
